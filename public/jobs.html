<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>नौकरी — गंगोह Jobs Board | गंगोह.in</title>
  <meta name="description" content="गंगोह और आस-पास नौकरी ढूंढें या दें — स्कूल, अस्पताल, दुकान, मंडी। Gangoh Jobs, Saharanpur।">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">

</head>
<body>
  <header id="site-header"></header>

  <div class="page-header">
    <div class="container">
      <h1>💼 नौकरी (Jobs Board)</h1>
      <p style="color:#888;margin:0.25rem 0 0;font-size:0.9rem;">नौकरी post करें या यहाँ मौजूद नौकरियां देखें — मुफ़्त में</p>
    </div>
  </div>

  <main class="container" style="padding-top:1.5rem;padding-bottom:3rem;">
    <div style="display:grid;grid-template-columns:1fr 2fr;gap:2rem;align-items:start;">

      <!-- Post job form -->
      <div style="background:white;border-radius:0.75rem;padding:1.5rem;box-shadow:0 2px 12px rgba(0,0,0,0.08);position:sticky;top:1rem;">
        <h2 style="font-size:1.1rem;margin:0 0 1.25rem;">✍️ नौकरी Post करें</h2>

        <div id="job-form-wrap">
          <div class="form-group">
            <label class="form-label">पद / टाइटल *</label>
            <input type="text" class="form-control" id="job-title" maxlength="80" placeholder="जैसे: टीचर चाहिए, सेल्समैन चाहिए">
          </div>
          <div class="form-group">
            <label class="form-label">Employer / Business का नाम *</label>
            <input type="text" class="form-control" id="job-employer" maxlength="80" placeholder="जैसे: गंगोह पब्लिक स्कूल">
          </div>
          <div class="form-group">
            <label class="form-label">श्रेणी *</label>
            <select class="form-control" id="job-category">
              <option value="">चुनें</option>
              <option value="school">स्कूल</option>
              <option value="hospital">अस्पताल</option>
              <option value="college">कॉलेज</option>
              <option value="mandi">मंडी</option>
              <option value="shop">दुकान</option>
              <option value="other">अन्य</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">सैलरी</label>
            <input type="text" class="form-control" id="job-salary" maxlength="40" placeholder="जैसे: ₹10,000–15,000/माह">
          </div>
          <div class="form-group">
            <label class="form-label">लोकेशन</label>
            <select class="form-control" id="job-village">
              <option value="">गंगोह / आस-पास</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">विवरण</label>
            <textarea class="form-control" id="job-desc" rows="3" placeholder="काम की जानकारी, योग्यता, समय..."></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">WhatsApp नंबर *</label>
            <input type="tel" class="form-control" id="job-phone" placeholder="10 अंक का नंबर" maxlength="10">
          </div>
          <p id="job-error" class="form-error" style="display:none;"></p>
          <div id="job-login-notice" style="display:none;background:#FEF3C7;border-radius:0.5rem;padding:0.75rem;font-size:0.9rem;margin-bottom:0.75rem;">
            ⚠️ Post करने के लिए <a href="login.html?next=jobs.html" style="color:#1D4ED8;font-weight:700;">Login करें</a>
          </div>
          <button id="job-submit-btn" class="btn btn-primary btn-full">📤 नौकरी Post करें</button>
        </div>

        <div id="job-success" style="display:none;text-align:center;padding:1rem 0;">
          <div style="font-size:2.5rem;">✅</div>
          <h3 style="margin:0.5rem 0 0.25rem;">Post हो गया!</h3>
          <p style="color:#888;font-size:0.9rem;">उम्मीदवार अब आपसे WhatsApp पर contact करेंगे।</p>
          <button id="job-post-another" class="btn btn-outline btn-sm" style="margin-top:1rem;">+ और Post करें</button>
        </div>
      </div>

      <!-- Job board -->
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
          <h2 style="font-size:1.1rem;margin:0;">📋 नौकरियां (Board)</h2>
          <button id="refresh-jobs-btn" class="btn btn-outline btn-sm">🔄 Refresh</button>
        </div>
        <div id="job-board"><div class="spinner"></div></div>
      </div>
    </div>
  </main>

  <footer id="site-footer"></footer>
  <div id="toast-container"></div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script type="module">
    import { mountUI, toast } from './assets/js/ui.js';
    import { initAuth, onAuthReady } from './assets/js/auth.js';
    import { initJobs, createJob, fetchJobs, updateOwnJob, deleteJob } from './assets/js/jobs.js';
    import { VILLAGES } from './data/villages.js';

    let fbConfig;
    try {
      const m = await import('./assets/js/firebase-config.js');
      fbConfig = m.firebaseConfig;
    } catch {
      document.body.innerHTML = `<div style="text-align:center;padding:4rem;">⚠️ Firebase config नहीं मिला।</div>`;
      throw new Error('missing');
    }

    if (!firebase.apps.length) firebase.initializeApp(fbConfig);
    const auth = firebase.auth();
    const db   = firebase.firestore();

    mountUI('jobs.html');
    initAuth(auth, db);
    initJobs(db, auth);

    // Populate village dropdown
    const villSel = document.getElementById('job-village');
    VILLAGES.filter(v => v.value !== 'other').forEach(v => {
      const o = document.createElement('option');
      o.value = v.value; o.textContent = v.label;
      villSel.appendChild(o);
    });

    let currentUser = null;
    onAuthReady(user => {
      currentUser = user;
      document.getElementById('job-login-notice').style.display = user ? 'none' : 'block';
      document.getElementById('job-submit-btn').style.display   = user ? 'block' : 'none';
    });

    // ── Submit job ──────────────────────────────────────────
    document.getElementById('job-submit-btn').addEventListener('click', async () => {
      const title    = document.getElementById('job-title').value.trim();
      const employer = document.getElementById('job-employer').value.trim();
      const category = document.getElementById('job-category').value;
      const salary   = document.getElementById('job-salary').value.trim();
      const location = document.getElementById('job-village').value;
      const desc     = document.getElementById('job-desc').value.trim();
      const phone    = document.getElementById('job-phone').value.trim();
      const errEl    = document.getElementById('job-error');

      if (!title || !employer || !category) { errEl.textContent = 'पद, employer और श्रेणी ज़रूरी है।'; errEl.style.display='block'; return; }
      if (!/^[6-9][0-9]{9}$/.test(phone)) { errEl.textContent = 'सही WhatsApp नंबर डालें (10 अंक)।'; errEl.style.display='block'; return; }
      errEl.style.display = 'none';

      const btn = document.getElementById('job-submit-btn');
      btn.disabled = true; btn.textContent = 'Post हो रहा है...';

      try {
        await createJob({ title, employerName: employer, category, salary, location, description: desc, contactWhatsApp: phone });
        document.getElementById('job-form-wrap').style.display = 'none';
        document.getElementById('job-success').style.display   = 'block';
        toast('नौकरी post हो गई!', 'success');
        loadBoard();
      } catch (err) {
        errEl.textContent = `Error: ${err.message}`; errEl.style.display='block';
      } finally {
        btn.disabled = false; btn.textContent = '📤 नौकरी Post करें';
      }
    });

    document.getElementById('job-post-another').addEventListener('click', () => {
      ['job-title','job-employer','job-category','job-salary','job-village','job-desc','job-phone']
        .forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
      document.getElementById('job-form-wrap').style.display = 'block';
      document.getElementById('job-success').style.display   = 'none';
    });

    // ── Load board ──────────────────────────────────────────
    const CATEGORY_LABELS = { school:'🏫 स्कूल', hospital:'🏥 अस्पताल', college:'🎓 कॉलेज', mandi:'🌾 मंडी', shop:'🏪 दुकान', other:'💼 अन्य' };

    async function loadBoard() {
      const board = document.getElementById('job-board');
      board.innerHTML = '<div class="spinner"></div>';
      try {
        const jobs = await fetchJobs();
        renderJsonLd(jobs);
        if (!jobs.length) {
          board.innerHTML = `<div class="empty-state"><span class="empty-icon">💼</span><p>अभी कोई नौकरी post नहीं है।<br>पहले आप post करें!</p></div>`;
          return;
        }
        board.innerHTML = '';
        jobs.forEach(j => board.appendChild(buildJobCard(j)));
      } catch (err) {
        board.innerHTML = `<div class="empty-state"><p>Error: ${err.message}</p></div>`;
      }
    }

    function buildJobCard(j) {
      const div = document.createElement('div');
      div.id = `job-${j.id}`;
      div.style.cssText = 'background:white;border-radius:0.75rem;padding:1rem 1.25rem;box-shadow:0 2px 8px rgba(0,0,0,0.07);margin-bottom:0.85rem;';

      const catLabel = CATEGORY_LABELS[j.category] || j.category;
      const villageLabel = (VILLAGES.find(v => v.value === j.location) || {}).label || 'गंगोह / आस-पास';
      const date = j.createdAt?.toDate ? j.createdAt.toDate().toLocaleDateString('hi-IN') : '';
      const waLink = `https://wa.me/91${j.contactWhatsApp}?text=${encodeURIComponent(`नमस्ते! मैंने गंगोह.in पर आपकी "${j.title}" की नौकरी की post देखी — मुझे रुचि है।`)}`;
      const isMine = currentUser && j.postedBy === currentUser.uid;

      div.innerHTML = `
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:0.5rem;flex-wrap:wrap;">
          <div>
            <span style="font-size:0.8rem;background:#DBEAFE;color:#1D4ED8;padding:0.2rem 0.6rem;border-radius:1rem;font-weight:700;">${catLabel}</span>
          </div>
          <div style="font-size:0.78rem;color:#bbb;">${date}</div>
        </div>
        <h3 style="margin:0.6rem 0 0.15rem;font-size:1.05rem;font-weight:800;">${escapeHtml(j.title)}</h3>
        <div style="font-size:0.88rem;color:#555;margin-bottom:0.3rem;">${escapeHtml(j.employerName)} · 📍 ${villageLabel}</div>
        ${j.salary ? `<div style="font-size:0.9rem;color:#15803D;font-weight:700;margin-bottom:0.3rem;">💰 ${escapeHtml(j.salary)}</div>` : ''}
        ${j.description ? `<p style="font-size:0.9rem;color:#333;margin:0.35rem 0 0.5rem;">${escapeHtml(j.description)}</p>` : ''}
        <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.6rem;align-items:center;">
          <a href="${waLink}" target="_blank" rel="noopener"
             style="display:inline-flex;align-items:center;gap:0.4rem;background:#25D366;color:white;padding:0.4rem 0.85rem;border-radius:0.5rem;font-size:0.85rem;font-weight:700;text-decoration:none;">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            WhatsApp करें
          </a>
          ${isMine ? `<button class="btn btn-outline btn-sm" data-edit-job="${j.id}">✏️ Edit</button>` : ''}
          ${isMine ? `<button class="btn btn-danger btn-sm" data-del-job="${j.id}">🗑️ Delete</button>` : ''}
          ${isMine ? `<span style="font-size:0.75rem;color:#888;">(आपकी post)</span>` : ''}
        </div>`;

      if (isMine) {
        div.querySelector(`[data-edit-job]`).addEventListener('click', () => openEditModal(j));
        div.querySelector(`[data-del-job]`).addEventListener('click', async () => {
          if (!confirm('इस नौकरी की post को delete करें?')) return;
          try {
            await deleteJob(j.id);
            document.getElementById(`job-${j.id}`)?.remove();
            toast('Delete हो गया।', 'success');
          } catch (err) {
            toast(`Error: ${err.message}`, 'error');
          }
        });
      }

      return div;
    }

    // ── Edit modal ────────────────────────────────────────
    function openEditModal(j) {
      document.getElementById('job-edit-modal')?.remove();

      const modal = document.createElement('div');
      modal.id = 'job-edit-modal';
      modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:999;display:flex;align-items:center;justify-content:center;padding:1rem;';
      modal.innerHTML = `
        <div style="background:white;border-radius:1rem;padding:1.5rem;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;">
          <h3 style="margin:0 0 1rem;font-size:1.1rem;">✏️ नौकरी Edit करें</h3>
          <div class="form-group">
            <label class="form-label">पद / टाइटल</label>
            <input id="je-title" class="form-control" value="${escapeHtml(j.title)}">
          </div>
          <div class="form-group">
            <label class="form-label">Employer / Business का नाम</label>
            <input id="je-employer" class="form-control" value="${escapeHtml(j.employerName)}">
          </div>
          <div class="form-group">
            <label class="form-label">सैलरी</label>
            <input id="je-salary" class="form-control" value="${escapeHtml(j.salary || '')}">
          </div>
          <div class="form-group">
            <label class="form-label">विवरण</label>
            <textarea id="je-desc" class="form-control" rows="3">${escapeHtml(j.description || '')}</textarea>
          </div>
          <div class="form-group">
            <label class="form-label">WhatsApp नंबर</label>
            <input id="je-phone" class="form-control" value="${escapeHtml(j.contactWhatsApp || '')}" maxlength="10">
          </div>
          <div style="display:flex;gap:0.75rem;margin-top:1rem;">
            <button id="je-save-btn" class="btn btn-primary" style="flex:1;">💾 Save करें</button>
            <button id="je-cancel-btn" class="btn btn-outline" style="flex:1;">Cancel</button>
          </div>
          <p id="je-error" class="form-error" style="display:none;"></p>
        </div>`;
      document.body.appendChild(modal);

      document.getElementById('je-cancel-btn').onclick = () => modal.remove();
      modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });

      document.getElementById('je-save-btn').onclick = async () => {
        const phone = document.getElementById('je-phone').value.trim();
        const errEl = document.getElementById('je-error');
        if (!/^[6-9][0-9]{9}$/.test(phone)) { errEl.textContent = 'सही WhatsApp नंबर डालें (10 अंक)।'; errEl.style.display='block'; return; }
        errEl.style.display = 'none';

        const saveBtn = document.getElementById('je-save-btn');
        saveBtn.disabled = true; saveBtn.textContent = 'Saving...';
        try {
          await updateOwnJob(j.id, {
            title:           document.getElementById('je-title').value.trim(),
            employerName:    document.getElementById('je-employer').value.trim(),
            salary:          document.getElementById('je-salary').value.trim(),
            description:     document.getElementById('je-desc').value.trim(),
            contactWhatsApp: phone,
          });
          toast('नौकरी update हो गई!', 'success');
          modal.remove();
          loadBoard();
        } catch (err) {
          errEl.textContent = `Error: ${err.message}`; errEl.style.display='block';
          saveBtn.disabled = false; saveBtn.textContent = '💾 Save करें';
        }
      };
    }

    function escapeHtml(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── JobPosting structured data for the visible board ─────
    function renderJsonLd(jobs) {
      document.querySelectorAll('script[data-jobposting-ld]').forEach(el => el.remove());
      jobs.slice(0, 20).forEach(j => {
        const ld = {
          '@context': 'https://schema.org/',
          '@type': 'JobPosting',
          title: j.title,
          description: j.description || j.title,
          datePosted: j.createdAt?.toDate ? j.createdAt.toDate().toISOString() : undefined,
          hiringOrganization: { '@type': 'Organization', name: j.employerName },
          jobLocation: {
            '@type': 'Place',
            address: { '@type': 'PostalAddress', addressLocality: 'Gangoh', addressRegion: 'UP', addressCountry: 'IN' }
          },
          ...(j.salary ? { baseSalary: { '@type': 'MonetaryAmount', currency: 'INR', value: { '@type': 'QuantitativeValue', value: j.salary } } } : {}),
        };
        const script = document.createElement('script');
        script.type = 'application/ld+json';
        script.dataset.jobpostingLd = '1';
        script.textContent = JSON.stringify(ld);
        document.head.appendChild(script);
      });
    }

    document.getElementById('refresh-jobs-btn').addEventListener('click', loadBoard);
    loadBoard();
  </script>

  <style>
    @media (max-width: 700px) {
      main .container > div { grid-template-columns: 1fr !important; }
      main .container > div > div:first-child { position: static !important; }
    }
  </style>
</body>
</html>
