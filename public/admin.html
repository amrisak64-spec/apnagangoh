<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — गंगोह.in</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <header id="site-header"></header>

  <div class="page-header">
    <div class="container" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.75rem;">
      <div>
        <h1>⚙️ Admin Panel</h1>
        <p style="color:#888;margin:0;font-size:0.85rem;">Listings moderate करें — approve, reject, verify, feature</p>
      </div>
      <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
        <button class="btn btn-outline btn-sm" id="refresh-btn">🔄 Refresh</button>
        <button class="btn btn-danger btn-sm" id="logout-btn">Logout</button>
      </div>
    </div>
  </div>

  <main class="container" style="padding-top:1.5rem;padding-bottom:3rem;">

    <!-- Stats row -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1rem;margin-bottom:2rem;" id="stats-row">
      <div style="background:white;border-radius:0.75rem;padding:1rem;box-shadow:0 2px 8px rgba(0,0,0,0.07);text-align:center;">
        <div style="font-size:2rem;font-weight:800;color:#1D4ED8;" id="stat-pending">—</div>
        <div style="font-size:0.85rem;color:#888;">Pending</div>
      </div>
      <div style="background:white;border-radius:0.75rem;padding:1rem;box-shadow:0 2px 8px rgba(0,0,0,0.07);text-align:center;">
        <div style="font-size:2rem;font-weight:800;color:#138808;" id="stat-live">—</div>
        <div style="font-size:0.85rem;color:#888;">Live</div>
      </div>
      <div style="background:white;border-radius:0.75rem;padding:1rem;box-shadow:0 2px 8px rgba(0,0,0,0.07);text-align:center;">
        <div style="font-size:2rem;font-weight:800;color:#1E40AF;" id="stat-rejected">—</div>
        <div style="font-size:0.85rem;color:#888;">Rejected</div>
      </div>
    </div>

    <!-- Tabs -->
    <div style="display:flex;gap:0.5rem;margin-bottom:1.5rem;border-bottom:2px solid #E2DDD8;">
      <button class="tab-btn active" data-tab="pending" style="padding:0.5rem 1rem;border:none;background:none;cursor:pointer;font-weight:600;font-size:1rem;font-family:inherit;color:#1D4ED8;border-bottom:2px solid #1D4ED8;margin-bottom:-2px;">
        Pending <span id="pending-count" style="background:#1D4ED8;color:white;border-radius:1rem;padding:0.1rem 0.4rem;font-size:0.75rem;margin-left:0.25rem;"></span>
      </button>
      <button class="tab-btn" data-tab="live" style="padding:0.5rem 1rem;border:none;background:none;cursor:pointer;font-weight:600;font-size:1rem;font-family:inherit;color:#888;">
        Live
      </button>
      <button class="tab-btn" data-tab="rejected" style="padding:0.5rem 1rem;border:none;background:none;cursor:pointer;font-weight:600;font-size:1rem;font-family:inherit;color:#888;">
        Rejected
      </button>
    </div>

    <div id="admin-content">
      <div class="spinner"></div>
    </div>
  </main>

  <footer id="site-footer"></footer>
  <div id="toast-container"></div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>
  <script type="module">
    import { mountUI, updateNavUser, toast, formatPrice } from './assets/js/ui.js';
    import { initAuth, requireAdmin, logout } from './assets/js/auth.js';
    import { initListings, approveListing, rejectListing, toggleVerified, toggleFeatured, deleteListingWithPhotos } from './assets/js/listings.js';

    let fbConfig;
    try {
      const m = await import('./assets/js/firebase-config.js');
      fbConfig = m.firebaseConfig;
    } catch {
      document.body.innerHTML = `<div style="text-align:center;padding:4rem;">⚠️ Firebase config नहीं मिला।</div>`;
      throw new Error('missing');
    }

    if (!firebase.apps.length) firebase.initializeApp(fbConfig);
    const auth    = firebase.auth();
    const db      = firebase.firestore();
    const storage = firebase.storage();

    mountUI('admin.html');
    initAuth(auth, db);
    initListings(db, storage, auth);

    const { user } = await requireAdmin();
    updateNavUser(user, true);

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await logout();
      window.location.href = 'index.html';
    });

    document.getElementById('refresh-btn').addEventListener('click', () => loadTab(currentTab));

    // ── Stats ─────────────────────────────────────────────
    async function loadStats() {
      try {
        const [pSnap, lSnap, rSnap] = await Promise.all([
          db.collection('listings').where('status','==','pending').get(),
          db.collection('listings').where('status','==','live').get(),
          db.collection('listings').where('status','==','rejected').get(),
        ]);
        document.getElementById('stat-pending').textContent = pSnap.size;
        document.getElementById('stat-live').textContent    = lSnap.size;
        document.getElementById('stat-rejected').textContent= rSnap.size;
        document.getElementById('pending-count').textContent = pSnap.size;
      } catch {}
    }
    loadStats();

    // ── Tabs ──────────────────────────────────────────────
    let currentTab = 'pending';
    let pendingUnsubscribe = null;

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => {
          b.style.color = '#888'; b.style.borderBottom = 'none';
        });
        btn.style.color = '#1D4ED8';
        btn.style.borderBottom = '2px solid #1D4ED8';
        btn.style.marginBottom = '-2px';
        currentTab = btn.dataset.tab;
        loadTab(currentTab);
      });
    });

    function loadTab(status) {
      // Unsubscribe old real-time listener if switching away from pending
      if (pendingUnsubscribe) { pendingUnsubscribe(); pendingUnsubscribe = null; }

      const content = document.getElementById('admin-content');
      content.innerHTML = '<div class="spinner"></div>';

      if (status === 'pending') {
        // Real-time listener — auto-updates when new posts arrive
        const q = db.collection('listings').where('status','==','pending').orderBy('createdAt','asc').limit(50);
        pendingUnsubscribe = q.onSnapshot(snap => {
          const listings = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          renderTable(listings, 'pending', content);
          document.getElementById('stat-pending').textContent = listings.length;
          document.getElementById('pending-count').textContent = listings.length;
        }, err => {
          content.innerHTML = `<div class="empty-state"><p>Error: ${err.message}</p></div>`;
        });
      } else {
        const q = status === 'live'
          ? db.collection('listings').where('status','==','live').orderBy('createdAt','desc').limit(50)
          : db.collection('listings').where('status','==','rejected').orderBy('createdAt','desc').limit(50);
        q.get().then(snap => {
          renderTable(snap.docs.map(d => ({ id: d.id, ...d.data() })), status, content);
        }).catch(err => {
          content.innerHTML = `<div class="empty-state"><p>Error: ${err.message}</p></div>`;
        });
      }
    }

    function renderTable(listings, status, container) {
      if (!listings.length) {
        container.innerHTML = `<div class="empty-state"><span class="empty-icon">✅</span><p>कोई ${status} listing नहीं।</p></div>`;
        return;
      }
      // Preserve existing tbody if real-time update, else rebuild
      let tbody = container.querySelector('#tbl-body');
      if (!tbody) {
        const table = document.createElement('table');
        table.className = 'admin-table';
        table.innerHTML = `<thead><tr>
  <th>फ़ोटो</th><th>टाइटल / लोकेशन</th><th>कीमत</th><th>प्रकार</th><th>तारीख</th><th>Actions</th>
</tr></thead><tbody id="tbl-body"></tbody>`;
        container.innerHTML = '';
        container.appendChild(table);
        tbody = table.querySelector('#tbl-body');
      }
      tbody.innerHTML = '';
      listings.forEach(l => tbody.appendChild(buildRow(l, status)));
    }

    function buildRow(l, status) {
      const tr = document.createElement('tr');
      tr.id = `row-${l.id}`;
      const thumb = l.photos?.length
        ? `<img src="${l.photos[0]}" style="width:64px;height:48px;object-fit:cover;border-radius:0.35rem;" loading="lazy">`
        : `<span style="font-size:2rem;">🏘️</span>`;
      const date = l.createdAt?.toDate ? l.createdAt.toDate().toLocaleDateString('hi-IN') : '—';
      const typeLabel = {plot:'प्लॉट',house:'मकान',shop:'दुकान',agri:'कृषि'}[l.type] || l.type;

      const actionBtns = status === 'pending'
        ? `<button class="btn btn-green btn-sm" data-action="approve" data-id="${l.id}">✅ Approve</button>
           <button class="btn btn-danger btn-sm" data-action="reject" data-id="${l.id}">❌ Reject</button>`
        : status === 'live'
        ? `<button class="btn btn-danger btn-sm" data-action="reject" data-id="${l.id}">❌ Reject</button>`
        : `<button class="btn btn-green btn-sm" data-action="approve" data-id="${l.id}">✅ Re-approve</button>`;

      tr.innerHTML = `
<td data-label="फ़ोटो">${thumb}</td>
<td data-label="टाइटल"><strong>${l.title||'—'}</strong><br><span style="font-size:0.8rem;color:#888;">📍 ${l.village||'गंगोह'} | ${l.ownerId?.slice(0,8)||''}...</span></td>
<td data-label="कीमत">${formatPrice(l.price)}</td>
<td data-label="प्रकार">${typeLabel}/${l.purpose==='sale'?'बिक्री':'किराया'}</td>
<td data-label="तारीख">${date}</td>
<td data-label="Actions" style="display:flex;flex-wrap:wrap;gap:0.35rem;align-items:center;">
  ${actionBtns}
  <a href="listing.html?id=${l.id}" class="btn btn-outline btn-sm" target="_blank">👁</a>
  <button class="btn btn-outline btn-sm" data-action="verify" data-id="${l.id}" data-current="${l.isVerified}"
    style="${l.isVerified?'background:#DBEAFE;':''}">
    ${l.isVerified?'☑ Verified':'Verify'}
  </button>
  <button class="btn btn-outline btn-sm" data-action="feature" data-id="${l.id}" data-current="${l.isFeatured}"
    style="${l.isFeatured?'background:#FDE68A;':''}">
    ${l.isFeatured?'⭐ Featured':'Feature'}
  </button>
  <button class="btn btn-outline btn-sm" data-action="edit" data-id="${l.id}" style="background:#EFF6FF;color:#1D4ED8;border-color:#1D4ED8;">✏️ Edit</button>
  <button class="btn btn-danger btn-sm" data-action="delete" data-id="${l.id}" title="हमेशा के लिए Delete करें">🗑️</button>
</td>`;

      tr.querySelectorAll('[data-action]').forEach(btn => {
        btn.addEventListener('click', () => handleAction(btn, l));
      });
      return tr;
    }

    async function handleAction(btn, l) {
      btn.disabled = true;
      try {
        const action = btn.dataset.action;
        if (action === 'approve') {
          await approveListing(l.id);
          document.getElementById(`row-${l.id}`)?.remove();
          toast('Approved!', 'success');
          loadStats();
        } else if (action === 'reject') {
          await rejectListing(l.id);
          document.getElementById(`row-${l.id}`)?.remove();
          toast('Rejected।', 'error');
          loadStats();
        } else if (action === 'edit') {
          openEditModal(l);
          btn.disabled = false;
          return;
        } else if (action === 'delete') {
          if (!confirm('इस listing को हमेशा के लिए Delete करें? Photos भी हटेंगी।')) { btn.disabled=false; return; }
          await deleteListingWithPhotos(l.id);
          document.getElementById(`row-${l.id}`)?.remove();
          toast('Deleted!', 'error');
          loadStats();
        } else if (action === 'verify') {
          const cur = btn.dataset.current === 'true';
          await toggleVerified(l.id, cur);
          btn.dataset.current = String(!cur);
          btn.textContent = !cur ? '☑ Verified' : 'Verify';
          btn.style.background = !cur ? '#DBEAFE' : '';
          toast(!cur ? 'Verified!' : 'Unverified।', 'success');
        } else if (action === 'feature') {
          const cur = btn.dataset.current === 'true';
          await toggleFeatured(l.id, cur);
          btn.dataset.current = String(!cur);
          btn.textContent = !cur ? '⭐ Featured' : 'Feature';
          btn.style.background = !cur ? '#FDE68A' : '';
          toast(!cur ? 'Featured!' : 'Unfeatured।', 'success');
        }
      } catch (err) {
        toast(`Error: ${err.message}`, 'error');
      } finally {
        btn.disabled = false;
      }
    }

    // ── Edit Modal ────────────────────────────────────────
    function openEditModal(l) {
      const existing = document.getElementById('edit-modal');
      if (existing) existing.remove();

      const modal = document.createElement('div');
      modal.id = 'edit-modal';
      modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:999;display:flex;align-items:center;justify-content:center;padding:1rem;';
      modal.innerHTML = `
        <div style="background:white;border-radius:1rem;padding:1.5rem;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;">
          <h3 style="margin:0 0 1rem;font-size:1.1rem;">✏️ Listing Edit करें</h3>
          <div class="form-group">
            <label style="font-size:0.85rem;font-weight:600;">Title</label>
            <input id="edit-title" class="form-control" value="${(l.title||'').replace(/"/g,'&quot;')}">
          </div>
          <div class="form-group">
            <label style="font-size:0.85rem;font-weight:600;">कीमत (₹)</label>
            <input id="edit-price" class="form-control" type="number" value="${l.price||''}">
          </div>
          <div class="form-group">
            <label style="font-size:0.85rem;font-weight:600;">विवरण</label>
            <textarea id="edit-desc" class="form-control" rows="3">${l.description||''}</textarea>
          </div>
          <div class="form-group">
            <label style="font-size:0.85rem;font-weight:600;">WhatsApp नंबर</label>
            <input id="edit-wa" class="form-control" value="${l.contactWhatsApp||''}">
          </div>
          <div style="display:flex;gap:0.75rem;margin-top:1rem;">
            <button id="edit-save-btn" class="btn btn-primary" style="flex:1;">💾 Save करें</button>
            <button id="edit-cancel-btn" class="btn btn-outline" style="flex:1;">Cancel</button>
          </div>
          <p id="edit-error" style="color:red;font-size:0.85rem;margin-top:0.5rem;display:none;"></p>
        </div>`;

      document.body.appendChild(modal);

      document.getElementById('edit-cancel-btn').onclick = () => modal.remove();
      modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });

      document.getElementById('edit-save-btn').onclick = async () => {
        const saveBtn = document.getElementById('edit-save-btn');
        saveBtn.disabled = true;
        saveBtn.textContent = 'Saving...';
        try {
          await db.collection('listings').doc(l.id).update({
            title:          document.getElementById('edit-title').value.trim(),
            price:          Number(document.getElementById('edit-price').value),
            description:    document.getElementById('edit-desc').value.trim(),
            contactWhatsApp:document.getElementById('edit-wa').value.trim(),
            updatedAt:      firebase.firestore.FieldValue.serverTimestamp(),
          });
          toast('Listing update हो गई!', 'success');
          modal.remove();
          loadTab(currentTab);
        } catch (err) {
          const errEl = document.getElementById('edit-error');
          errEl.textContent = err.message;
          errEl.style.display = 'block';
          saveBtn.disabled = false;
          saveBtn.textContent = '💾 Save करें';
        }
      };
    }

    // Initial load — pending tab with real-time listener
    loadTab('pending');
  </script>
</body>
</html>
