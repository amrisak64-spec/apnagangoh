<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">लिस्टिंग — गंगोह.in</title>
  <meta name="description" id="page-desc" content="गंगोह प्रॉपर्टी लिस्टिंग — गंगोह.in">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <header id="site-header"></header>

  <main class="container section" id="main-content">
    <div class="spinner"></div>
  </main>

  <footer id="site-footer"></footer>
  <div id="toast-container"></div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script type="module">
    import { mountUI, toast, formatPrice, waURL } from './assets/js/ui.js';
    import { initListings, fetchListing } from './assets/js/listings.js';
    import { ALL_LOCATIONS } from './data/villages.js';

    let fbConfig;
    try {
      const m = await import('./assets/js/firebase-config.js');
      fbConfig = m.firebaseConfig;
    } catch {
      document.getElementById('main-content').innerHTML =
        `<div style="text-align:center;padding:4rem;">⚠️ Firebase config नहीं मिला।</div>`;
      throw new Error('missing');
    }

    if (!firebase.apps.length) firebase.initializeApp(fbConfig);
    const db = firebase.firestore();
    mountUI();
    initListings(db, null, null);

    const id = new URLSearchParams(location.search).get('id');
    const main = document.getElementById('main-content');

    if (!id) {
      main.innerHTML = `<div class="empty-state"><span class="empty-icon">❓</span><p>लिस्टिंग नहीं मिली।</p><a href="browse.html" class="btn btn-primary" style="margin-top:1rem;">Browse करें</a></div>`;
    } else {
      loadListing(id);
    }

    async function loadListing(listingId) {
      try {
        const listing = await fetchListing(listingId);
        if (!listing || listing.status !== 'live') {
          main.innerHTML = `<div class="empty-state"><span class="empty-icon">🚫</span><p>यह listing उपलब्ध नहीं है।</p><a href="browse.html" class="btn btn-primary" style="margin-top:1rem;">Browse करें</a></div>`;
          return;
        }
        renderListing(listing);
      } catch (err) {
        main.innerHTML = `<div class="empty-state"><p>Error: ${err.message}</p></div>`;
      }
    }

    function renderListing(l) {
      document.getElementById('page-title').textContent = `${l.title} — ${l.village || 'गंगोह'} | गंगोह.in`;
      document.getElementById('page-desc').content = `${l.title} — ${l.purpose === 'sale' ? 'बिक्री' : 'किराये'} पर। कीमत: ${formatPrice(l.price)}। ${l.village || 'गंगोह'}, Gangoh।`;

      const typeLabel    = { plot:'प्लॉट', house:'मकान', shop:'दुकान', agri:'खेती की ज़मीन' }[l.type] || l.type;
      const purposeLabel = l.purpose === 'sale' ? 'बिक्री' : 'किराया';

      // Smart headline: "200 गज का प्लॉट", "6 बीघा खेती की ज़मीन" etc.
      const headlineMap = {
        plot:  l.areaSize ? `${l.areaSize} ${l.areaUnit || 'गज'} का प्लॉट`        : 'प्लॉट',
        house: l.areaSize ? `${l.areaSize} ${l.areaUnit || 'गज'} का मकान`         : 'मकान',
        shop:  l.areaSize ? `${l.areaSize} ${l.areaUnit || 'गज़'} की दुकान`        : 'दुकान',
        agri:  l.areaSize ? `${l.areaSize} ${l.areaUnit || 'बीघा'} खेती की ज़मीन` : 'खेती की ज़मीन',
      };
      const headline = headlineMap[l.type] || l.title;

      // Price breakup rows
      const breakupRows = [];
      if (l.ratePerGaj)    breakupRows.push(['रेट', `₹${Number(l.ratePerGaj).toLocaleString('hi-IN')} / गज`]);
      if (l.ratePerBigha)  breakupRows.push(['रेट', `₹${Number(l.ratePerBigha).toLocaleString('hi-IN')} / बीघा`]);
      if (l.areaSize)      breakupRows.push(['साइज़', `${l.areaSize} ${l.areaUnit || ''}`]);
      if (l.roadSizeFeet)  breakupRows.push(['सड़क चौड़ाई', `${l.roadSizeFeet} फ़ुट`]);
      if (l.storey)        breakupRows.push(['मंज़िल', l.storey === 'single' ? 'Single Storey' : l.storey === 'double' ? 'Double Storey' : 'Triple Storey']);
      if (l.rooms)         breakupRows.push(['कमरे', l.rooms]);
      if (l.securityDeposit) breakupRows.push(['Security Deposit', formatPrice(l.securityDeposit)]);
      if (l.pagdi)         breakupRows.push(['पगड़ी', formatPrice(l.pagdi)]);

      const breakupHTML = breakupRows.length ? `
        <div style="border:1.5px solid #EDE9FE;border-radius:0.75rem;overflow:hidden;margin-top:1rem;">
          ${breakupRows.map(([k,v], i) => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:0.65rem 1rem;${i<breakupRows.length-1?'border-bottom:1px solid #F5F3FF;':''}background:${i%2===0?'#FAFAFA':'white'};">
            <span style="font-size:0.88rem;color:#6B6B6B;">${k}</span>
            <span style="font-size:0.95rem;font-weight:700;color:#1A1A1A;">${v}</span>
          </div>`).join('')}
        </div>` : '';

      // Gallery
      const photos = l.photos && l.photos.length ? l.photos : [];
      const galleryHTML = photos.length
        ? `<div class="gallery">
            <img class="gallery-main" id="gallery-main" src="${photos[0]}" alt="${l.title}">
            ${photos.length > 1 ? `<div class="gallery-thumbs">${photos.map((p,i) =>
              `<img class="gallery-thumb${i===0?' active':''}" data-full="${p}" src="${p}" alt="photo ${i+1}">`
            ).join('')}</div>` : ''}
           </div>`
        : `<div style="width:100%;aspect-ratio:16/10;background:linear-gradient(135deg,#F0EDE8,#E5E0DA);border-radius:0.75rem;display:flex;align-items:center;justify-content:center;font-size:4rem;">🏘️</div>`;

      const waMsg  = `नमस्ते, मुझे ${headline} (${purposeLabel} | ${formatPrice(l.price)}) के बारे में जानकारी चाहिए। गंगोह.in पर देखा।`;
      const waLink = l.contactWhatsApp ? waURL(l.contactWhatsApp, waMsg) : '#';

      main.innerHTML = `
<div style="margin-bottom:1rem;">
  <a href="browse.html" style="color:#888;font-size:0.9rem;">← वापस जाएं</a>
</div>

<div class="detail-grid">
  <!-- Left: Headline + Gallery + Details -->
  <div>

    <!-- BIG HEADLINE -->
    <div style="background:white;border-radius:0.75rem;padding:1.25rem 1.5rem;margin-bottom:1rem;box-shadow:0 2px 8px rgba(0,0,0,0.07);">

      <!-- Badges -->
      <div style="display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:0.75rem;">
        <span class="badge ${l.purpose==='sale'?'badge-sale':'badge-rent'}">${purposeLabel}</span>
        ${l.isVerified ? `<span class="badge badge-verified">✓ Verified</span>` : ''}
        ${l.isFeatured ? `<span class="badge badge-featured">⭐ Featured</span>` : ''}
      </div>

      <!-- Size + Type — BIG RED -->
      <h1 style="font-size:clamp(1.8rem,6vw,2.6rem);font-weight:900;color:#DC2626;line-height:1.15;margin-bottom:0.35rem;letter-spacing:-0.02em;">${headline}</h1>

      <!-- User title as subtitle -->
      <p style="font-size:1rem;color:#555;margin:0 0 0.85rem;line-height:1.5;">${escapeHtml(l.title)}</p>

      <!-- Location -->
      <div style="display:flex;flex-wrap:wrap;gap:0.4rem 1.25rem;font-size:0.95rem;color:#444;">
        <span>📍 <strong>${l.village || 'गंगोह'}</strong></span>
        ${l.locality ? `<span>🏘️ ${l.locality}</span>` : ''}
        ${l.landmark ? `<span>🚩 ${l.landmark}</span>` : ''}
      </div>

      <hr style="margin:1rem 0;border:none;border-top:1.5px solid #F5F3FF;">

      <!-- Full Price -->
      <div style="margin-bottom:0.2rem;font-size:0.8rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.08em;">
        ${l.purpose === 'rent' ? 'मासिक किराया' : 'कुल कीमत'}
      </div>
      <div style="font-size:clamp(1.6rem,5vw,2.2rem);font-weight:900;color:#5B35D5;line-height:1.1;">
        ${formatPrice(l.price)}${l.purpose === 'rent' ? '<span style="font-size:1rem;font-weight:600;color:#888;"> / माह</span>' : ''}
      </div>

      <!-- Price Breakup -->
      ${breakupHTML}
    </div>

    <!-- Gallery -->
    ${galleryHTML}

    <!-- Description -->
    ${l.description ? `
    <div style="background:white;border-radius:0.75rem;padding:1.25rem 1.5rem;margin-top:1rem;box-shadow:0 2px 8px rgba(0,0,0,0.07);">
      <h3 style="font-size:1rem;font-weight:800;margin-bottom:0.5rem;">विवरण</h3>
      <p style="color:#555;line-height:1.8;white-space:pre-wrap;font-size:0.95rem;">${escapeHtml(l.description)}</p>
    </div>` : ''}
  </div>

  <!-- Right: Contact -->
  <div>
    <div class="detail-info-card" style="position:sticky;top:80px;">
      <!-- Mini price repeat for sticky sidebar -->
      <div style="font-size:1.4rem;font-weight:900;color:#DC2626;margin-bottom:0.15rem;">${headline}</div>
      <div style="font-size:1.1rem;font-weight:800;color:#5B35D5;margin-bottom:1rem;">${formatPrice(l.price)}${l.purpose==='rent'?' / माह':''}</div>
      <hr style="margin:0 0 1rem;border:none;border-top:1.5px solid #F0EDE8;">

      ${l.contactWhatsApp
        ? `<a href="${waLink}" class="whatsapp-btn" target="_blank" rel="noopener">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            WhatsApp पर संपर्क करें
           </a>`
        : `<p style="color:#888;text-align:center;padding:1rem;">Contact नंबर उपलब्ध नहीं</p>`
      }

      <div style="margin-top:0.75rem;display:flex;flex-direction:column;gap:0.5rem;">
        <a id="wa-share-btn" href="#" target="_blank" rel="noopener"
           style="display:flex;align-items:center;justify-content:center;gap:0.5rem;padding:0.7rem;border-radius:0.5rem;font-weight:700;font-size:0.95rem;background:#25D366;color:white;text-decoration:none;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          WhatsApp पर Share करें
        </a>
        <a id="fb-share-btn" href="#" target="_blank" rel="noopener"
           style="display:flex;align-items:center;justify-content:center;gap:0.5rem;padding:0.7rem;border-radius:0.5rem;font-weight:700;font-size:0.95rem;background:#1877F2;color:white;text-decoration:none;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          Facebook पर Share करें
        </a>
        <button id="copy-link-btn"
           style="display:flex;align-items:center;justify-content:center;gap:0.5rem;padding:0.7rem;border-radius:0.5rem;font-weight:700;font-size:0.95rem;background:white;color:#5B35D5;border:2px solid #5B35D5;cursor:pointer;width:100%;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Link Copy करें
        </button>
      </div>

      <div style="margin-top:1.25rem;padding-top:1rem;border-top:1.5px solid #F0EDE8;">
        <p style="font-size:0.8rem;color:#888;margin:0 0 0.3rem;">पोस्ट की तारीख</p>
        <p style="font-size:0.85rem;color:#555;" id="posted-date">—</p>
      </div>
      <div style="margin-top:0.75rem;">
        <a href="about.html#report" style="font-size:0.8rem;color:#DC2626;">🚩 फर्ज़ी लिस्टिंग रिपोर्ट करें</a>
      </div>
    </div>
  </div>
</div>`;

      // Set posted date
      if (l.createdAt?.toDate) {
        document.getElementById('posted-date').textContent =
          l.createdAt.toDate().toLocaleDateString('hi-IN', { year:'numeric', month:'long', day:'numeric' });
      }

      // Gallery thumb clicks
      document.querySelectorAll('.gallery-thumb').forEach(thumb => {
        thumb.addEventListener('click', () => {
          document.getElementById('gallery-main').src = thumb.dataset.full;
          document.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('active'));
          thumb.classList.add('active');
        });
      });

      // WhatsApp share
      const waShareText = encodeURIComponent(`🏘️ ${l.title}\n💰 ${formatPrice(l.price)} | 📍 ${l.village || 'गंगोह'}\n\nगंगोह.in पर देखें: ${location.href}`);
      document.getElementById('wa-share-btn').href = `https://wa.me/?text=${waShareText}`;

      // Facebook share
      document.getElementById('fb-share-btn').href = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(location.href)}`;

      // Copy link
      document.getElementById('copy-link-btn')?.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(location.href);
          const btn = document.getElementById('copy-link-btn');
          btn.textContent = '✓ Link Copy हो गया!';
          btn.style.background = '#D1FAE5';
          btn.style.color = '#065F46';
          btn.style.borderColor = '#065F46';
          setTimeout(() => {
            btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Link Copy करें`;
            btn.style.background = 'white'; btn.style.color = '#5B35D5'; btn.style.borderColor = '#5B35D5';
          }, 2000);
        } catch {
          toast('Link copy नहीं हो सका', 'error');
        }
      });
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
